<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanod — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050508;--bg-2:#09090F;--bg-3:#0E0E18;
  --blue:#2563EB;--blue-light:#3B82F6;--blue-bright:#60A5FA;
  --blue-dim:rgba(37,99,235,0.08);--blue-border:rgba(37,99,235,0.2);
  --text:#F0F0F8;--text-2:#8A8AA8;--text-3:#4A4A68;
  --red:#F87171;--green:#34D399;
  --font-display:'Space Grotesk',sans-serif;
  --font-mono:'Space Mono',monospace;
  --radius:6px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}

nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--blue-border);}
.nav-logo{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-logo-mark{width:26px;height:26px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:white;}

.container{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;position:relative;}
.container::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 50%,rgba(37,99,235,0.04) 0%,transparent 65%);pointer-events:none;}

.card{background:var(--bg-2);border:1px solid var(--blue-border);padding:48px 44px;width:100%;max-width:420px;border-radius:12px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--blue-bright),var(--blue));border-radius:12px 12px 0 0;}

.icon{width:56px;height:56px;background:var(--blue-dim);border:1px solid var(--blue-border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--blue-bright);}
.card-title{font-size:1.7rem;font-weight:700;letter-spacing:-0.02em;text-align:center;margin-bottom:6px;}
.card-sub{font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);text-align:center;margin-bottom:28px;}

.form-group{margin-bottom:14px;}
.form-label{font-size:0.72rem;font-weight:500;color:var(--text-2);display:block;margin-bottom:6px;}
.pw-wrap{position:relative;display:flex;align-items:center;}
.form-input{width:100%;background:var(--bg-3);border:1px solid var(--blue-border);color:var(--text);font-family:var(--font-display);font-size:0.88rem;padding:11px 42px 11px 14px;outline:none;transition:border-color 0.25s;border-radius:var(--radius);}
.form-input:focus{border-color:var(--blue);}
.form-input::placeholder{color:var(--text-3);}
.pw-toggle{position:absolute;right:13px;background:none;border:none;color:var(--text-3);cursor:pointer;padding:0;display:flex;align-items:center;transition:color 0.2s;}
.pw-toggle:hover{color:var(--blue-bright);}

.strength-bar{height:3px;background:var(--bg-3);border-radius:2px;overflow:hidden;margin-top:6px;}
.strength-fill{height:100%;width:0;transition:width 0.3s,background 0.3s;border-radius:2px;}
.strength-text{font-size:0.68rem;color:var(--text-3);margin-top:3px;}

.btn-submit{width:100%;background:var(--blue);border:none;color:white;font-size:0.82rem;font-weight:600;padding:13px;cursor:pointer;transition:all 0.25s;border-radius:var(--radius);margin-top:6px;}
.btn-submit:hover{background:var(--blue-light);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}

.auth-alert{padding:11px 14px;border-radius:var(--radius);font-size:0.82rem;margin-bottom:14px;display:none;}
.auth-alert.show{display:block;}
.auth-alert.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);}
.auth-alert.success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--green);}

.invalid-token{text-align:center;padding:20px 0;}
.invalid-token-icon{font-size:2.5rem;margin-bottom:12px;}
.invalid-token-title{font-size:1.1rem;font-weight:600;color:var(--red);margin-bottom:8px;}
.invalid-token-sub{font-size:0.84rem;color:var(--text-3);line-height:1.6;}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

.back-link{display:block;text-align:center;margin-top:20px;font-family:var(--font-mono);font-size:0.72rem;color:var(--text-3);text-decoration:none;transition:color 0.2s;}
.back-link:hover{color:var(--blue-bright);}

@media(max-width:480px){nav{padding:14px 20px;}.card{padding:32px 20px;}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-mark">T</div>
    Thanod
  </a>
</nav>

<div class="container">
  <div class="card">
    <div class="icon">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
      </svg>
    </div>

    <!-- INVALID TOKEN STATE -->
    <div id="invalidState" style="display:none;">
      <div class="invalid-token">
        <div class="invalid-token-icon">⚠️</div>
        <div class="invalid-token-title">Link expired or invalid</div>
        <div class="invalid-token-sub">This reset link has expired or already been used. Reset links are valid for 15 minutes.</div>
      </div>
      <a href="login.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:20px;">Back to Sign In</a>
    </div>

    <!-- RESET FORM -->
    <div id="resetForm">
      <div class="card-title">New Password</div>
      <div class="card-sub">// Choose a strong password</div>

      <div class="auth-alert" id="alertBox"></div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="pw-wrap">
          <input type="password" class="form-input" id="newPassword" placeholder="Minimum 8 characters" oninput="checkStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('newPassword',this)" tabindex="-1">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat your password" onkeydown="if(event.key==='Enter')handleReset()">
          <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword',this)" tabindex="-1">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" id="resetBtn" onclick="handleReset()">Reset Password</button>
      <a class="back-link" href="login.html">← Back to sign in</a>
    </div>

  </div>
</div>

<script>
const API = 'https://aurethium-backend.onrender.com';

// Get token from URL
const params = new URLSearchParams(window.location.search);
const resetToken = params.get('token');

if (!resetToken) {
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('invalidState').style.display = 'block';
}

function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = `auth-alert show ${type}`;
}

function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  const eyeOn = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>';
  const eyeOff = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>';
  btn.innerHTML = isHidden ? eyeOff : eyeOn;
}

function checkStrength(p) {
  const fill = document.getElementById('strengthFill');
  const text = document.getElementById('strengthText');
  let s = 0;
  if (p.length >= 8) s++; if (p.length >= 12) s++;
  if (/[A-Z]/.test(p)) s++; if (/[0-9]/.test(p)) s++;
  if (/[^A-Za-z0-9]/.test(p)) s++;
  const levels = [['20%','#F87171','Very weak'],['40%','#FB923C','Weak'],['60%','#FBBF24','Fair'],['80%','#34D399','Strong'],['100%','#10B981','Very strong']];
  const l = levels[Math.min(s-1,4)] || levels[0];
  fill.style.width = p ? l[0] : '0';
  fill.style.background = l[1];
  text.textContent = p ? l[2] : '';
  text.style.color = l[1];
}

async function handleReset() {
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showAlert('Passwords do not match.'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Resetting...';

  try {
    const res = await fetch(`${API}/api/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password })
    });
    const data = await res.json();

    if (data.success) {
      showAlert('Password reset successfully! Redirecting to sign in...', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else if (data.expired) {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('invalidState').style.display = 'block';
    } else {
      showAlert(data.error || 'Reset failed. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  } catch {
    showAlert('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
