<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanod — Set New Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050508;--bg-2:#09090F;--bg-3:#0E0E18;
  --blue:#2563EB;--blue-light:#3B82F6;--blue-bright:#60A5FA;
  --blue-dim:rgba(37,99,235,0.08);--blue-border:rgba(37,99,235,0.2);
  --text:#F0F0F8;--text-2:#8A8AA8;--text-3:#4A4A68;
  --red:#F87171;--green:#34D399;
  --font-display:'Space Grotesk',sans-serif;
  --font-mono:'Space Mono',monospace;
  --radius:6px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}

.card{background:var(--bg-2);border:1px solid var(--blue-border);padding:48px 44px;width:100%;max-width:440px;border-radius:12px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--blue-bright),var(--blue));border-radius:12px 12px 0 0;}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;}
.logo-mark{width:30px;height:30px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:700;color:white;}
.logo-text{font-size:1.2rem;font-weight:700;letter-spacing:-0.02em;}

.page-tag{font-family:var(--font-mono);font-size:0.6rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-3);text-align:center;margin-bottom:8px;}
.title{font-size:1.7rem;font-weight:700;letter-spacing:-0.02em;text-align:center;margin-bottom:6px;}
.subtitle{font-size:0.84rem;color:var(--text-2);line-height:1.65;text-align:center;margin-bottom:28px;}

.notice{background:rgba(251,146,60,0.07);border:1px solid rgba(251,146,60,0.2);border-radius:var(--radius);padding:12px 14px;font-size:0.81rem;color:#FB923C;line-height:1.6;margin-bottom:20px;}

.form-group{margin-bottom:16px;}
.form-label{font-family:var(--font-mono);font-size:0.62rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-2);display:block;margin-bottom:7px;}
.pw-wrap{position:relative;display:flex;align-items:center;}
.pw-wrap .form-input{padding-right:44px;width:100%;}
.form-input{width:100%;background:var(--bg-3);border:1px solid var(--blue-border);color:var(--text);font-family:var(--font-display);font-size:0.88rem;padding:11px 14px;outline:none;transition:border-color 0.25s;border-radius:var(--radius);}
.form-input:focus{border-color:var(--blue);}
.form-input::placeholder{color:var(--text-3);}
.pw-toggle{position:absolute;right:13px;background:none;border:none;color:var(--text-3);cursor:pointer;padding:0;display:flex;align-items:center;transition:color 0.2s;flex-shrink:0;}
.pw-toggle:hover{color:var(--blue-bright);}

.strength-bar{height:3px;background:var(--bg-3);border-radius:3px;margin-top:8px;overflow:hidden;}
.strength-fill{height:100%;border-radius:3px;transition:width 0.3s,background 0.3s;}

.form-alert{padding:11px 14px;border-radius:var(--radius);font-size:0.82rem;margin-bottom:16px;display:none;}
.form-alert.show{display:block;}
.form-alert.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);}
.form-alert.success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--green);}

.btn-submit{width:100%;background:var(--blue);border:none;color:white;font-family:var(--font-display);font-size:0.88rem;font-weight:600;padding:14px;cursor:pointer;transition:background 0.25s;border-radius:var(--radius);margin-top:4px;}
.btn-submit:hover{background:var(--blue-light);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:480px){.card{padding:32px 20px;}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">T</div>
    <div class="logo-text">Thanod</div>
  </div>
  <div class="page-tag">// First Login</div>
  <div class="title">Set Your Password</div>
  <p class="subtitle">You're using a temporary password. Choose a new one to secure your account.</p>

  <div class="notice">Your temporary password expires in 48 hours. Set a new password now to keep access to your account.</div>

  <div class="form-alert" id="alertBox"></div>

  <div class="form-group">
    <label class="form-label">New Password</label>
    <div class="pw-wrap">
      <input type="password" class="form-input" id="newPassword" placeholder="Min. 8 characters" oninput="checkStrength()" onkeydown="if(event.key==='Enter')submitChange()">
      <button type="button" class="pw-toggle" onclick="togglePw('newPassword',this)" tabindex="-1">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      </button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%;background:var(--red);"></div></div>
  </div>

  <div class="form-group">
    <label class="form-label">Confirm New Password</label>
    <div class="pw-wrap">
      <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat new password" onkeydown="if(event.key==='Enter')submitChange()">
      <button type="button" class="pw-toggle" onclick="togglePw('confirmPassword',this)" tabindex="-1">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      </button>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitChange()">Set New Password</button>
</div>

<script>
const API = 'https://aurethium-backend.onrender.com';
const token = localStorage.getItem('aurethium_token');
if (!token) { window.location.href = 'login.html'; }

const eyeOn = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>';
const eyeOff = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>';

function togglePw(id, btn) {
  const el = document.getElementById(id);
  const hidden = el.type === 'password';
  el.type = hidden ? 'text' : 'password';
  btn.innerHTML = hidden ? eyeOff : eyeOn;
}

function checkStrength() {
  const pw = document.getElementById('newPassword').value;
  const fill = document.getElementById('strengthFill');
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct = (score / 5) * 100;
  const colors = ['var(--red)', 'var(--red)', '#FB923C', '#FBBF24', 'var(--green)'];
  fill.style.width = `${pct}%`;
  fill.style.background = colors[score - 1] || 'var(--red)';
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `form-alert show ${type}`;
}

async function submitChange() {
  const newPw = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmPassword').value;

  if (!newPw || newPw.length < 8) {
    showAlert('Password must be at least 8 characters.');
    return;
  }
  if (newPw !== confirmPw) {
    showAlert('Passwords do not match.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  try {
    const res = await fetch(`${API}/api/auth/change-password`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ new_password: newPw })
    });
    const data = await res.json();

    if (data.success) {
      if (data.token) {
        localStorage.setItem('aurethium_token', data.token);
        if (data.user) localStorage.setItem('aurethium_user', JSON.stringify(data.user));
      }
      showAlert('Password updated! Taking you to your dashboard…', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    } else {
      showAlert(data.error || 'Failed to update password. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  } catch {
    showAlert('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Set New Password';
  }
}
</script>
</body>
</html>
