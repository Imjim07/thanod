<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanod — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050508;--bg-2:#09090F;--bg-3:#0E0E18;--blue:#2563EB;--blue-light:#3B82F6;--blue-bright:#60A5FA;--blue-dim:rgba(37,99,235,0.08);--blue-border:rgba(37,99,235,0.2);--text:#F0F0F8;--text-2:#8A8AA8;--text-3:#4A4A68;--red:#F87171;--green:#34D399;--font-display:'Space Grotesk',sans-serif;--font-mono:'Space Mono',monospace;--radius:6px;}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}
.card{background:var(--bg-2);border:1px solid var(--blue-border);padding:48px 44px;width:100%;max-width:400px;border-radius:12px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--blue-bright),var(--blue));border-radius:12px 12px 0 0;}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--blue-dim);border:1px solid var(--blue-border);padding:5px 12px;border-radius:20px;margin-bottom:20px;font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue-bright);}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue-bright);}
.title{font-size:1.8rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px;}
.sub{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:28px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:0.72rem;font-weight:500;color:var(--text-2);display:block;margin-bottom:6px;}
.form-input{width:100%;background:var(--bg-3);border:1px solid var(--blue-border);color:var(--text);font-family:var(--font-display);font-size:0.88rem;padding:11px 14px;outline:none;transition:border-color 0.25s;border-radius:var(--radius);}
.form-input:focus{border-color:var(--blue);}
.form-input::placeholder{color:var(--text-3);}
.btn-submit{width:100%;background:var(--blue);border:none;color:white;font-size:0.82rem;font-weight:600;padding:13px;cursor:pointer;transition:all 0.25s;border-radius:var(--radius);margin-top:6px;}
.btn-submit:hover{background:var(--blue-light);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
.auth-alert{padding:11px 14px;border-radius:var(--radius);font-size:0.82rem;margin-bottom:14px;display:none;}
.auth-alert.show{display:block;}
.auth-alert.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);}
.auth-alert.success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--green);}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.back-link{display:block;text-align:center;margin-top:20px;font-size:0.78rem;color:var(--text-3);text-decoration:none;transition:color 0.2s;font-family:var(--font-mono);}
.back-link:hover{color:var(--blue-bright);}
</style>
</head>
<body>
<div class="card">
  <div class="badge">Admin Access</div>
  <div class="title">Admin Portal</div>
  <div class="sub">// Thanod Control Centre</div>
  <div class="auth-alert" id="alertBox"></div>
  <div class="form-group"><label class="form-label">Admin Email</label><input type="email" class="form-input" id="adminEmail" placeholder="admin@thanod.io" onkeydown="if(event.key==='Enter')handleLogin()"></div>
  <div class="form-group"><label class="form-label">Admin Password</label><input type="password" class="form-input" id="adminPassword" placeholder="Admin password" onkeydown="if(event.key==='Enter')handleLogin()"></div>
  <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Access Admin Panel</button>
  <a class="back-link" href="index.html">← Back to main site</a>
</div>
<script>
const API = 'https://aurethium-backend.onrender.com';
if (localStorage.getItem('aurethium_admin_token')) window.location.href = 'admin-dashboard.html';

function showAlert(msg, type='error') { const b = document.getElementById('alertBox'); b.textContent = msg; b.className = `auth-alert show ${type}`; }

async function handleLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  if (!email || !password) { showAlert('Please enter your admin credentials.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Verifying...';
  try {
    const res = await fetch(`${API}/api/admin/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (data.success && data.token) {
      localStorage.setItem('aurethium_admin_token', data.token);
      showAlert('Access granted. Loading dashboard...', 'success');
      setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
    } else { showAlert(data.error || 'Invalid credentials. Access denied.'); btn.disabled = false; btn.textContent = 'Access Admin Panel'; }
  } catch { showAlert('Connection error. Please try again.'); btn.disabled = false; btn.textContent = 'Access Admin Panel'; }
}
</script>
</body>
</html>
