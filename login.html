<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanod — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050508;--bg-2:#09090F;--bg-3:#0E0E18;
  --blue:#2563EB;--blue-light:#3B82F6;--blue-bright:#60A5FA;
  --blue-dim:rgba(37,99,235,0.08);--blue-border:rgba(37,99,235,0.2);
  --text:#F0F0F8;--text-2:#8A8AA8;--text-3:#4A4A68;
  --red:#F87171;--green:#34D399;
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;--font-mono:'Space Mono',monospace;
  --radius:6px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--blue-border);}
.nav-logo{font-family:var(--font-display);font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
.nav-logo-mark{width:26px;height:26px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:white;}
.nav-link{font-family:var(--font-display);font-size:0.8rem;font-weight:500;color:var(--text-2);text-decoration:none;transition:color 0.2s;}
.nav-link:hover{color:var(--blue-bright);}
.auth-container{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;position:relative;}
.auth-container::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 50%,rgba(37,99,235,0.04) 0%,transparent 65%);pointer-events:none;}
.auth-card{background:var(--bg-2);border:1px solid var(--blue-border);padding:48px 44px;width:100%;max-width:440px;border-radius:12px;position:relative;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--blue-bright),var(--blue));border-radius:12px 12px 0 0;}
.auth-logo{font-family:var(--font-display);font-size:1.2rem;font-weight:700;letter-spacing:-0.02em;text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.auth-logo-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:white;}
.auth-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;letter-spacing:-0.02em;text-align:center;margin-bottom:4px;}
.auth-subtitle{font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);text-align:center;margin-bottom:28px;}
.form-group{margin-bottom:14px;}
.form-label{font-family:var(--font-display);font-size:0.72rem;font-weight:500;color:var(--text-2);display:block;margin-bottom:6px;}
.form-input{width:100%;background:var(--bg-3);border:1px solid var(--blue-border);color:var(--text);font-family:var(--font-body);font-size:0.88rem;padding:11px 14px;outline:none;transition:border-color 0.25s;border-radius:var(--radius);}
.form-input:focus{border-color:var(--blue);}
.form-input::placeholder{color:var(--text-3);}
.form-forgot{text-align:right;margin-top:5px;}
.form-forgot a{font-size:0.73rem;color:var(--text-3);text-decoration:none;transition:color 0.2s;}
.form-forgot a:hover{color:var(--blue-bright);}
.btn-submit{width:100%;background:var(--blue);border:none;color:white;font-family:var(--font-display);font-size:0.82rem;font-weight:600;padding:13px;cursor:pointer;transition:all 0.25s;border-radius:var(--radius);margin-top:6px;}
.btn-submit:hover{background:var(--blue-light);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--blue-border);}
.auth-divider span{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);}
.btn-wallet{width:100%;background:transparent;border:1px solid var(--blue-border);color:var(--text-2);font-family:var(--font-display);font-size:0.8rem;font-weight:500;padding:12px 18px;cursor:pointer;transition:all 0.25s;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-wallet:hover{border-color:var(--blue);color:var(--blue-bright);}
.btn-wallet.connected{border-color:var(--green);color:var(--green);}
.auth-footer{text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-3);}
.auth-footer a{color:var(--blue-bright);text-decoration:none;}
.auth-footer a:hover{color:var(--blue-light);}
.auth-alert{padding:11px 14px;border-radius:var(--radius);font-size:0.82rem;margin-bottom:14px;display:none;}
.auth-alert.show{display:block;}
.auth-alert.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);}
.auth-alert.success{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--green);}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){nav{padding:14px 20px;}.auth-card{padding:32px 20px;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><div class="nav-logo-mark">T</div>Thanod</a>
  <a class="nav-link" href="signup.html">Create Account →</a>
</nav>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-mark">T</div>Thanod</div>
    <div class="auth-title">Welcome back.</div>
    <div class="auth-subtitle">// Sign in to your portfolio</div>
    <div class="auth-alert" id="alertBox"></div>
    <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-input" id="loginEmail" placeholder="you@example.com"></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="loginPassword" placeholder="Your password" onkeydown="if(event.key==='Enter')handleLogin()"><div class="form-forgot"><a href="#">Forgot password?</a></div></div>
    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Sign In</button>
    <div class="auth-divider"><span>or</span></div>
    <button class="btn-wallet" id="walletBtn" onclick="connectWallet()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3L12 7L8 3"/><circle cx="17" cy="14" r="1" fill="currentColor"/></svg>
      <span id="walletBtnText">Sign In with MetaMask</span>
    </button>
    <div class="auth-footer">Don't have an account? <a href="signup.html">Create one free</a></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script>
const API = 'https://aurethium-backend.onrender.com';
if (localStorage.getItem('aurethium_token')) window.location.href = 'dashboard.html';

function showAlert(msg, type='error') { const b = document.getElementById('alertBox'); b.textContent = msg; b.className = `auth-alert show ${type}`; }

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showAlert('Please enter your email and password.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Signing in...';
  try {
    const res = await fetch(`${API}/api/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (data.success && data.token) {
      localStorage.setItem('aurethium_token', data.token); localStorage.setItem('aurethium_user', JSON.stringify(data.user));
      showAlert('Signed in! Loading dashboard...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } else { showAlert(data.error || 'Invalid email or password.'); btn.disabled = false; btn.textContent = 'Sign In'; }
  } catch { showAlert('Connection error. Please try again.'); btn.disabled = false; btn.textContent = 'Sign In'; }
}

async function connectWallet() {
  if (!window.ethereum) { showAlert('MetaMask not detected. Please install MetaMask from metamask.io'); return; }
  const btn = document.getElementById('walletBtn'), text = document.getElementById('walletBtnText');
  btn.disabled = true; text.textContent = 'Connecting...';
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const address = accounts[0], timestamp = Date.now();
    const message = `Welcome to Thanod!\n\nSign this to create or access your account.\n\nWallet: ${address}\nTimestamp: ${timestamp}\n\nThis will not trigger a blockchain transaction.`;
    const signature = await window.ethereum.request({ method: 'personal_sign', params: [message, address] });
    const res = await fetch(`${API}/api/auth/wallet`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ address, signature, message }) });
    const data = await res.json();
    if (data.success && data.token) {
      localStorage.setItem('aurethium_token', data.token); localStorage.setItem('aurethium_user', JSON.stringify(data.user));
      btn.classList.add('connected'); text.textContent = `${address.slice(0,6)}...${address.slice(-4)}`;
      showAlert('Wallet verified! Loading dashboard...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } else { showAlert(data.error || 'Wallet sign-in failed.'); btn.disabled = false; text.textContent = 'Sign In with MetaMask'; }
  } catch (err) {
    showAlert(err.code === 4001 ? 'Cancelled. Please approve the MetaMask request.' : 'Wallet connection failed.');
    btn.disabled = false; text.textContent = 'Sign In with MetaMask';
  }
}
</script>
</body>
</html>
